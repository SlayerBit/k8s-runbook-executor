# secret.example.yaml — TEMPLATE ONLY.
#
# Copy this file to secret.yaml, fill in the real values, then apply:
#   kubectl apply -f k8s/secret.yaml
#
# secret.yaml is in .gitignore — never commit real credentials.
#
# Values must be base64-encoded:
#   echo -n 'mysecretpassword' | base64

apiVersion: v1
kind: Secret
metadata:
  name: agent2-secret
  namespace: food-app
  labels:
    app: agent2
    app.kubernetes.io/managed-by: agent2
type: Opaque
data:
  # Base64-encoded Redis password. Leave empty string ("") if Redis has no auth.
  # echo -n 'your-redis-password' | base64
  REDIS_PASSWORD: ""
