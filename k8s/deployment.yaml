apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent2
  namespace: food-app
  labels:
    app: agent2
    app.kubernetes.io/managed-by: agent2
spec:
  replicas: 1
  # Agent 2 is a single-consumer worker. Running more than 1 replica is safe
  # (each pod will consume different messages from Redis) but is rarely needed.
  selector:
    matchLabels:
      app: agent2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent2
      annotations:
        # Force a rollout when the ConfigMap changes (CI/CD pattern)
        # kubectl.kubernetes.io/restartedAt: "2024-01-01T00:00:00Z"
    spec:
      serviceAccountName: agent2
      automountServiceAccountToken: true

      # Give the pod time to finish processing the current runbook on shutdown
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: agent2
          image: your-registry.io/your-project/agent2:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - name: health
              containerPort: 8080
              protocol: TCP

          # ── Environment from ConfigMap ────────────────────────────────────
          envFrom:
            - configMapRef:
                name: agent2-config

          # ── Secrets injected individually ─────────────────────────────────
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent2-secret
                  key: REDIS_PASSWORD
                  optional: true   # Remove this line if Redis auth is mandatory

          # ── Probes ────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          # ── Resources ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # ── Temp dir required for a read-only root filesystem ─────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Prefer to schedule away from the food-app workloads it manages
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: NotIn
                      values: ["agent2"]
                topologyKey: kubernetes.io/hostname

      # Tolerate any node taints added for operational nodes
      tolerations: []
